<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hod mincí</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Hod mincí</h1>
      <p>Klikni na tlačítko a zjisti, jestli padne panna nebo orel.</p>

      <button id="flip-button" type="button">Hodit mincí</button>

      <section class="result" aria-live="polite">
        <h2>Výsledek</h2>
        <p id="result-text">Zatím žádný hod.</p>
      </section>

      <section class="stats">
        <h2>Statistiky</h2>
        <ul>
          <li>Celkem hodů: <span id="total-count">0</span></li>
          <li>Panna: <span id="heads-count">0</span></li>
          <li>Orel: <span id="tails-count">0</span></li>
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
